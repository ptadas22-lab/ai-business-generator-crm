<!DOCTYPE html>
<html>
<head>
  <title>AI Business Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
      margin: 0;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 20px;
    }

    h2 {
      text-align: center;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: #1e293b;
      color: white;
    }

    button {
      padding: 10px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .primary {
      width: 100%;
      margin-top: 15px;
      background: #22c55e;
      color: black;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin-top: 15px;
      border-radius: 16px;
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .start { background: #3b82f6; color: white; }
    .save { background: #facc15; color: black; }
    .share { background: #22c55e; color: black; }
    .delete { background: red; color: white; }

    .plan {
      background: #020617;
      padding: 15px;
      margin-top: 20px;
      border-radius: 12px;
    }

    .saved-card {
      background: #1e293b;
      padding: 10px;
      margin: 10px 0;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
  </style>
</head>

<body>

<div class="container">

<h2>🚀 AI Business Generator</h2>

<input id="budget" placeholder="Enter Budget ₹">
<input id="location" placeholder="Enter Location">
<input id="type" placeholder="Business Type">

<button class="Button" onclick="generateIdeas()">Generate Ideas</button>

<div id="output"></div>

<h3>Saved Ideas</h3>
<div id="saved"></div>

</div>

<script src="script.js?v=34"></script>

</body>
</html>

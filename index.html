<!DOCTYPE html>
<html>
<head>
  <title>AI Business Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
  margin: 0;
}

/* Layout */
.container {
  max-width: 500px;
  margin: auto;
  padding: 30px 20px;
}

/* Heading */
h2 {
  text-align: center;
  margin-bottom: 20px;
}

/* Inputs */
input {
  margin-bottom: 12px;
}
  width: 100%;
  padding: 12px;
  margin-top: 20px;
  border-radius: 10px;
  border: none;
  background: #1e293b;
  color: white;
  transition: 0.2s ease;
}

input:focus {
  outline: 2px solid #22c55e;
  background: #0f172a;
}

/* Buttons */
button {
  padding: 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s ease;
}

button:hover {
  opacity: 0.9;
  transform: scale(1.02);
}

/* Primary button */
.primary {
  width: 100%;
  margin-top: 15px;
  background: #22c55e;
  color: black;
}

/* Card */
.card {
  background: #1e293b;
  padding: 15px;
  margin-top: 15px;
  border-radius: 16px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  transition: 0.2s ease;
}

.card:hover {
  transform: translateY(-2px);
}

/* Actions */
.actions {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}

.actions button {
  flex: 1;
  padding: 8px;
  border-radius: 8px;
}

/* Action colors */
.start { background: #3b82f6; color: white; }
.save { background: #facc15; color: black; }
.share { background: #22c55e; color: black; }
.delete { background: red; color: white; }

/* Plan section */
.plan {
  background: #020617;
  padding: 15px;
  margin-top: 20px;
  border-radius: 12px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

/* Saved card */
.saved-card {
  background: #1e293b;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
}
  </style>
</head>

<body>

<div class="container">

<h2>🚀 AI Business Generator</h2>

<input id="budget" placeholder="Enter Budget ₹">
<input id="location" placeholder="Enter Location">
<input id="type" placeholder="Business Type">

<button class="Button" onclick="generateIdeas()">Generate Ideas</button>

<div id="output"></div>

<h3>Saved Ideas</h3>
<div id="saved"></div>

</div>

<script src="script.js?v=500"></script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>AI Business Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    /* ===== GLOBAL ===== */
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
  margin: 0;
}

/* ===== CONTAINER ===== */
.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

/* ===== INPUTS ===== */
input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: #1e293b;
  color: white;
}

/* ===== BUTTON ===== */
button {
  padding: 10px 15px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: #38bdf8;
  color: black;
  font-weight: bold;
}

button:hover {
  background: #0ea5e9;
}

/* ===== CARDS ===== */
.card, .saved-card {
  background: #1e293b;
  padding: 15px;
  border-radius: 15px;
  margin-top: 15px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}

/* ===== ACTION BUTTONS ===== */
.actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

/* ===== EDIT MODE ===== */
#editStatus {
  margin-top: 10px;
  color: #4ade80;
}

/* ===== PLAN ===== */
.plan {
  background: #020617;
  padding: 15px;
  border-radius: 10px;
  margin-top: 10px;
}
    .loading {
  text-align: center;
  margin-top: 20px;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0.5; }
}
</style>
</head>

<body>

<div class="container">

<div class="container">

  <h2>🚀 AI Business Generator</h2>

  <input id="budget" placeholder="Enter Budget ₹">
  <input id="location" placeholder="Enter Location">
  <input id="type" placeholder="Business Type">

  <button id="generateBtn" onclick="generateIdeas()">✨ Generate Smart Ideas</button>
  <button onclick="saveIdea()">💾 Save Idea</button>
  <button onclick="cancelEdit()">❌ Cancel Edit</button>

  <p id="editStatus"></p>

  <input id="searchInput" placeholder="Search ideas..." onkeyup="searchIdeas()">

  <div id="results"></div>

  <h3>📌 Saved Ideas</h3>
  <div id="saved"></div>

</div>
  
<input 
  type="text" 
  id="searchInput" 
  placeholder="🔍 Search saved ideas..." 
  oninput="searchIdeas()"
/>
  <button onclick="clearAll()">🗑 Clear All</button>
  <button onclick="cancelEdit()">Cancel Edit</button>
<h3>Saved Ideas</h3>
<div id="saved"></div>

</div>

<script src="script.js?v=111"></script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>AI Business Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
  margin: 0;
}

/* Layout */
.container {
  max-width: 500px;
  margin: auto;
  padding: 30px 20px;
}

/* Heading */
h2 {
  text-align: center;
  margin-bottom: 20px;
}

/* Inputs */
input, select {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border-radius: 10px;
  border: none;
  background: #1e293b;
  color: white;
  transition: 0.2s ease;
}

input:focus, select:focus {
  outline: 2px solid #22c55e;
  background: #0f172a;
}

/* Buttons */
button {
  padding: 10px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s ease;
}

button:hover {
  opacity: 0.9;
  transform: scale(1.05);
}

/* Primary button */
.primary, .Button {
  width: 100%;
  margin-top: 15px;
  background: #22c55e;
  color: black;
  padding: 12px;
  border-radius: 12px;
}

/* Card */
.card {
  background: linear-gradient(145deg, #1e293b, #0f172a);
  padding: 18px;
  margin-top: 15px;
  border-radius: 18px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  transition: 0.3s ease;
  border: 1px solid rgba(255,255,255,0.05);
}

.card:hover {
  transform: translateY(-5px);
}

/* Highlight profit */
.card b {
  color: #22c55e;
  font-size: 16px;
}

/* Actions */
.actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}

.actions button {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
}

/* Button colors */
.start { background: #3b82f6; color: white; }
.save { background: #facc15; color: black; }
.share { background: #22c55e; color: black; }
.delete { background: red; color: white; }
.copy { background: #9333ea; color: white; }

/* Plan section */
.plan {
  background: #020617;
  padding: 18px;
  margin-top: 25px;
  border-radius: 14px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  border-left: 4px solid #22c55e;
}

/* Saved card */
.saved-card {
  background: #1e293b;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
}

/* Results section */
#results {
  margin-top: 20px;
}

/* Idea cards (optional if still used) */
.idea-card {
  background: #111827;
  padding: 15px;
  margin-top: 10px;
  border-radius: 12px;
  border: 1px solid #1f2937;
  transition: 0.2s;
}

.idea-card:hover {
  transform: scale(1.02);
  border-color: #6366f1;
}
  </style>
</head>

<body>

<div class="container">

<h2>🚀 AI Business Generator</h2>

<input id="budget" placeholder="Enter Budget ₹">
<input id="location" placeholder="Enter Location">
<input id="type" placeholder="Business Type">
  <label>Number of Ideas</label>
<select id="count">
  <option value="3">3</option>
  <option value="5">5</option>
  <option value="10">10</option>
</select>

<button id="generateBtn" class="Button" onclick="generateIdeas()">✨ Generate Smart Ideas</button>

  <button onclick="copyAll()">Copy All</button>
<h3>🚀 Generated Ideas</h3>
  <div id="results"></div>
   <p id="emptyMsg">No ideas generated yet</p>
  </div>
<input 
  type="text" 
  id="searchInput" 
  placeholder="🔍 Search saved ideas..." 
  oninput="searchIdeas()"
/>
  <button onclick="clearAll()">🗑 Clear All</button>
<h3>Saved Ideas</h3>
<div id="saved"></div>

</div>

<script src="script.js?v=111"></script>

</body>
</html>
